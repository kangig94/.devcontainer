name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      image:
        description: Image target
        required: true
        default: base
        type: choice
        options:
          - base
          - ppocr
          - isaaclab
      push:
        description: Push built image to Docker Hub
        required: true
        default: true
        type: boolean
      python_version:
        description: Python version
        required: true
        default: "3.12"
        type: string
      torch_version:
        description: PyTorch version
        required: true
        default: "2.10.0"
        type: string
      cuda_tag:
        description: CUDA image tag for base and Isaac Lab
        required: true
        default: cu128
        type: string
      cuda_toolkit_version:
        description: CUDA toolkit apt package suffix
        required: true
        default: "12-8"
        type: string
      max_jobs:
        description: Parallel source build jobs
        required: true
        default: "2"
        type: string
      isaacsim_version:
        description: Isaac Sim version
        required: true
        default: "6.0.0"
        type: string
      isaaclab_version:
        description: Isaac Lab git tag
        required: true
        default: v3.0.0-beta
        type: string

concurrency:
  group: docker-image-build-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  DOCKER_BUILDKIT: "1"

jobs:
  build:
    name: Build ${{ inputs.image }}
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build through Makefile
        env:
          DOCKER_REGISTRY: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TARGET: ${{ inputs.image }}
          PUSH_IMAGE: ${{ inputs.push }}
          PYTHON_VERSION: ${{ inputs.python_version }}
          TORCH_VERSION: ${{ inputs.torch_version }}
          CUDA_TAG: ${{ inputs.cuda_tag }}
          CUDA_TOOLKIT_VERSION: ${{ inputs.cuda_toolkit_version }}
          MAX_JOBS: ${{ inputs.max_jobs }}
          ISAACSIM_VERSION: ${{ inputs.isaacsim_version }}
          ISAACLAB_VERSION: ${{ inputs.isaaclab_version }}
        run: |
          set -euo pipefail

          cu="${CUDA_TAG#cu}"

          make ci \
            target="$IMAGE_TARGET" \
            push="$PUSH_IMAGE" \
            py="$PYTHON_VERSION" \
            torch="$TORCH_VERSION" \
            cu="$cu" \
            cuda_toolkit="$CUDA_TOOLKIT_VERSION" \
            MAX_JOBS="$MAX_JOBS" \
            isaacsim="$ISAACSIM_VERSION" \
            isaaclab="$ISAACLAB_VERSION"

      - name: Summarize
        env:
          IMAGE_TARGET: ${{ inputs.image }}
          PUSH_IMAGE: ${{ inputs.push }}
        run: |
          {
            echo "### Docker image build"
            echo
            echo "- Target: \`$IMAGE_TARGET\`"
            echo "- Pushed: \`$PUSH_IMAGE\`"
            echo "- Entrypoint: \`make ci\`"
          } >> "$GITHUB_STEP_SUMMARY"
