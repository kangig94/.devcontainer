name: devcontainer

services:
  lab:
    env_file:
      - .env

    image: ${DOCKER_REGISTRY:-your-registry}/${IMAGE_NAME:-uv-torch}:${PY_TAG:-py312}-${TORCH_VERSION:-2.10.0}-${CUDA_TAG:-cu128}-dev
    working_dir: /home/dev/workspace
    volumes:
      # Entrypoint script (runtime injection)
      - ../scripts/entrypoint.sh:/entrypoint.sh:ro

      # Host mounts (configure in .env, defaults to workspace root)
      - ${HOST_WORKSPACE_DIR:-../..}:/home/dev/workspace
      - ${HOST_CACHE_DIR:-~/.cache}:/home/dev/.cache
      - ${HOST_DATASETS_DIR:-../../datasets}:/home/dev/datasets

      # Claude CLI (session data & config)
      - ${HOST_CLAUDE_DIR:-${NAS_HOME}/.claude-dev}:/home/dev/.claude

      # Tmux config
      - ${NAS_HOME}/.tmux.conf:/home/dev/.tmux.conf

      # Claude plugins cache on local disk (avoid NAS small-file I/O penalty)
      - claude-plugins-cache:/home/dev/.claude/plugins/cache

      # X11 display forwarding (no-op if socket doesn't exist)
      - /tmp/.X11-unix:/tmp/.X11-unix

    entrypoint: [ "/entrypoint.sh" ]

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - USER_UID=${USER_UID:-1000}
      - USER_GID=${USER_GID:-1000}
      # USERNAME is baked into the image as ENV (base Dockerfile), no override needed.
      - WORKSPACE_DIR=/home/dev/workspace
      - CERT_DIR=/home/dev/workspace/.devcontainer

    ports:
      - "${PORT_JUPYTER:-18888}:8888"
      - "${PORT_TENSORBOARD:-16006}:6006"
      - "${PORT_GRADIO:-17860}:7860"
      - "${PORT_SSH:-10022}:22"

    command: [ "zsh", "-lc", "jupyter lab &> /tmp/jupyter.log & exec zsh -l" ]

    stdin_open: true
    tty: true
    ipc: host

    runtime: nvidia

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [ gpu ]
    #              device_ids: ['3']

    networks:
      - dev_network

volumes:
  claude-plugins-cache:

networks:
  dev_network:
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_SUBNET:-192.168.10.0/24}
