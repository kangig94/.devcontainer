# Isaac Lab overlay — use with: -f docker-compose.yml -f docker-compose.isaaclab.yml
name: isaaclab

services:
  lab:
    image: ${DOCKER_REGISTRY:-local}/isaaclab:py${PYTHON_VERSION:-312}
    build:
      context: ../..
      dockerfile: .devcontainer/isaaclab/Dockerfile
      target: ${BUILD_TARGET:-user}
      network: host
      args:
        ISAACSIM_IMAGE: ${ISAACSIM_IMAGE:-nvcr.io/nvidia/isaac-sim:6.0.0-dev2}
        PYTHON_VERSION: ${PYTHON_VERSION:-3.12}
        ISAACLAB_VERSION: ${ISAACLAB_VERSION:-v3.0.0-beta}
    network_mode: host
    # base attaches `lab` to dev_network (192.168.10/24, NAS-safe);
    # isaaclab uses host networking, which is mutually exclusive with `networks`.
    networks: !reset null

    environment:
      - VIRTUAL_ENV=/opt/venv
      - UV_EXTRA_INDEX_URL=https://pypi.nvidia.com
      - UV_INDEX_STRATEGY=unsafe-best-match
      - UV_OVERRIDE=/etc/isaaclab-overrides.txt
      - PIP_EXTRA_INDEX_URL=https://pypi.nvidia.com
      - PIP_FIND_LINKS=https://py.mujoco.org/
      - ACCEPT_EULA=Y
      - PRIVACY_CONSENT=Y
      # Display forwarding for Isaac Sim GUI (ignored if DISPLAY is unset)
      - DISPLAY=${DISPLAY:-}
      # NCCL multi-node (harmless when single-node)
      - NCCL_SOCKET_IFNAME=^docker0,lo
      - NCCL_IB_DISABLE=1
