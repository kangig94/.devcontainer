# Multi-node training overlay — use with:
#   -f compose/docker-compose.yml -f compose/docker-compose.multinode.yml
#
# Inherits image, mounts, env, runtime, ipc/tty from base. Overrides only
# what multi-node distributed RL needs (host network, NCCL, RDMA tuning).
#
# Usage:
#   1. make up-multinode             (on every node)
#   2. make shell-multinode          (exec into each)
#   3. ./scripts/setup_multinode.sh  (inside container, on each node)
#   4. master node: run training script
name: multinode

services:
  lab:
    # Host network for direct NCCL inter-node communication.
    # Mutually exclusive with the dev_network defined in base; reset.
    network_mode: host
    networks: !reset null
    # Host network makes published port mapping a no-op; clear to avoid the
    # "Published ports are discarded when using host network mode" warning.
    ports: !reset null

    environment:
      - NCCL_DEBUG=INFO
      - NCCL_SOCKET_IFNAME=^docker0,lo
      - NCCL_IB_DISABLE=1

    # RDMA / large memory pinning (required by NCCL on some setups).
    cap_add:
      - IPC_LOCK
    ulimits:
      memlock:
        soft: -1
        hard: -1

    # Use all visible GPUs on the node (base defaults to driver-default).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # Host network → bind jupyter on the public host port directly.
    command: ["zsh", "-lc", "jupyter lab --ip=0.0.0.0 --port=18888 &> /tmp/jupyter.log & exec zsh -l"]
