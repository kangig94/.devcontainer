# PaddleOCR overlay — use with: -f docker-compose.yml -f docker-compose.ppocr.yml
# Paddle's latest supported CUDA is 12.6 — this overlay assumes the base
# image was built with CUDA_TAG=cu126 (handled by `make build-ppocr`).
name: ppocr

services:
  lab:
    image: ${DOCKER_REGISTRY:-your-registry}/ppocr:${PY_TAG:-py312}-${CUDA_TAG:-cu126}-dev
    build:
      context: ..
      dockerfile: ppocr/Dockerfile
      args:
        # BASE_IMAGE must point at the cu126-flavored base built earlier.
        BASE_IMAGE: ${DOCKER_REGISTRY:-your-registry}/${IMAGE_NAME:-uv-torch}:${PY_TAG:-py312}-${TORCH_VERSION:-2.10.0}-${CUDA_TAG:-cu126}-dev
        PADDLE_CUDA_TAG: ${PADDLE_CUDA_TAG:-cu126}
