# PaddleOCR overlay — use with: -f docker-compose.yml -f docker-compose.ppocr.yml
name: ppocr

services:
  lab:
    image: ${DOCKER_REGISTRY:-your-registry}/ppocr:${PY_TAG:-py312}-cu126${IMAGE_SUFFIX:--dev}
    build:
      context: ../..
      dockerfile: .devcontainer/ppocr/Dockerfile
      target: ${BUILD_TARGET:-user}
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.12}
        CUDA_TAG: cu126
