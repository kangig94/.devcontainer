# Multi-node training docker-compose for Isaac Lab
# Usage:
#   1. Start container on all nodes: make up-isaaclab-multinode
#   2. Exec into each container and run scripts/setup_multinode.sh
#   3. Exec into master and run training script

services:
  isaaclab:
    environment:
      - NCCL_DEBUG=INFO
      - NCCL_SOCKET_IFNAME=^docker0,lo
      - NCCL_IB_DISABLE=1

    # RDMA/NCCL memory optimization
    cap_add:
      - IPC_LOCK
    ulimits:
      memlock:
        soft: -1
        hard: -1
